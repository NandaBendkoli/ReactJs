<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="root"></div>

    <script>
      const heading = document.createElement("h1");
      heading.innerText = "Hello World!";

      const root = document.querySelector(".root");
      root.append(heading);
    </script>
  </body>
</html>
